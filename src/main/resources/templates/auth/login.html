<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <style>
    body{font-family:Arial;background:#f5f5f5}
    .box{width:350px;margin:100px auto;padding:30px;background:white;border-radius:10px}
    input{width:100%;padding:10px;margin:10px 0}
    button{width:100%;padding:10px;background:#ff9800;border:none;color:white}
  </style>
</head>

<body>

<div class="box">
  <h2>Đăng nhập hệ thống khô gà</h2>

  <form th:action="@{/login}" method="post">

    <input name="username" placeholder="Username">

    <input type="password" name="password" placeholder="Password">

    <button>Login</button>

    <div th:if="${param.error}">Sai tài khoản</div>

  </form>

  <a th:href="@{/store/register}">Đăng ký User</a>
</div>

</body>
</html>
