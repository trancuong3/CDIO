<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        /* Đồng bộ dải màu Topbar */
        .topbar {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            padding: 12px 0;
            color: white;
        }
        .topbar h4 { margin: 0; }

        /* Form bo tròn hiện đại */
        .cart-card {
            border-radius: 16px;
            border: none;
        }

        /* Nút chốt đơn đồng màu */
        .btn-checkout {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            color: white;
            font-weight: bold;
            border: none;
            transition: all 0.3s;
        }
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3);
            color: white;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="topbar mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h4>🛒 Đại Lý Khô Gà - Giỏ Hàng</h4>
        <a href="/store/dashboard" class="btn btn-light btn-sm fw-bold">⬅ Tiếp tục mua sắm</a>
    </div>
</div>

<div class="container mb-5">

    <div th:if="${cartItems.isEmpty()}" class="text-center mt-5">
        <h4 class="text-muted mb-4">Giỏ hàng của bạn đang trống!</h4>
        <a href="/store/dashboard" class="btn btn-checkout px-5 py-2">Quay lại chọn món</a>
    </div>

    <div th:unless="${cartItems.isEmpty()}" class="row">

        <div class="col-lg-8">
            <div class="card cart-card shadow-sm mb-3">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Sản phẩm</th>
                                <th>Đơn giá</th>
                                <th class="text-center">Số lượng</th>
                                <th>Thành tiền</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${cartItems}">
                                <td class="ps-4 fw-bold text-dark" th:text="${item.name}">Khô gà</td>
                                <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                <td style="width: 140px;">
                                    <div class="input-group input-group-sm">
                                        <button class="btn btn-outline-secondary btn-minus" th:data-id="${item.productId}">-</button>
                                        <input type="number" min="1" class="form-control text-center input-qty" th:value="${item.quantity}">
                                        <button class="btn btn-outline-secondary btn-plus" th:data-id="${item.productId}">+</button>
                                    </div>
                                </td>

                                <td class="text-danger fw-bold item-total" th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                <td>
                                    <form action="/store/cart/remove" method="post" class="m-0">
                                        <input type="hidden" name="id" th:value="${item.productId}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">🗑️</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card cart-card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold border-bottom pb-3 mb-3">Tóm tắt đơn hàng</h5>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Tổng số lượng:</span>
                        <span class="fw-bold text-dark" id="cartTotalCount" th:text="${totalCount} + ' hộp'"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5">Tổng thanh toán:</span>
                        <span class="text-danger fw-bold fs-4" id="cartTotalPrice" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                    </div>

                    <form action="/store/order/create" method="post">
                        <button type="submit" class="btn btn-checkout w-100 py-3 fs-5 shadow-sm">🚀 CHỐT ĐƠN NGAY</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        // Hàm gửi AJAX lên server để cập nhật
        function updateQuantity(id, newQty, btn) {
            $.post("/store/cart/update", { id: id, quantity: newQty }, function(res) {
                let row = btn.closest('tr');

                // Cập nhật số lượng trên ô input
                row.find('.input-qty').val(newQty);

                // Cập nhật giá tiền của món đó (toLocaleString để có dấu phẩy)
                row.find('.item-total').text(res.itemTotal.toLocaleString('en-US') + ' đ');

                // Cập nhật Tổng thanh toán & Tổng số lượng bên phải
                $('#cartTotalPrice').text(res.totalPrice.toLocaleString('en-US') + ' đ');
                $('#cartTotalCount').text(res.totalCount + ' bịch');
            });
        }

        // Khi bấm nút [+]
        $('.btn-plus').click(function() {
            let id = $(this).data('id');
            let input = $(this).siblings('.input-qty');
            let newQty = parseInt(input.val()) + 1;
            updateQuantity(id, newQty, $(this));
        });

        // Khi bấm nút [-]
        $('.btn-minus').click(function() {
            let id = $(this).data('id');
            let input = $(this).siblings('.input-qty');
            let newQty = parseInt(input.val()) - 1;

            if(newQty >= 1) { // Không cho giảm dưới 1 (dưới 1 thì bắt họ bấm nút Thùng rác)
                updateQuantity(id, newQty, $(this));
            }
        });

        $('.input-qty').change(function() {
            // Lấy ID sản phẩm từ nút "btn-plus" nằm ngay bên cạnh nó
            let id = $(this).siblings('.btn-plus').data('id');
            let newQty = parseInt($(this).val());

            // Bảo mật: Nếu họ cố tình gõ chữ linh tinh hoặc số âm, ép nó về 1
            if (isNaN(newQty) || newQty < 1) {
                newQty = 1;
                $(this).val(1);
            }

            // Gọi hàm cập nhật AJAX y như lúc bấm nút
            updateQuantity(id, newQty, $(this));
        });
    });
</script>
</body>
</html>
