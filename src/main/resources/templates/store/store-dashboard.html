<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đại lý - Hệ thống Khô Gà</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #212529;
            color: white;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px;
            display: block;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background-color: #f39c12;
            color: white;
        }

        .product-card {
            transition: all 0.2s ease-in-out;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: .5rem;
            border-top-right-radius: .5rem;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3" style="width: 250px;">
        <h4 class="text-warning text-center fw-bold mt-2 mb-4">Đại Lý Khô Gà</h4>

        <a href="#">📦 Đặt hàng</a>
        <a href="#">📝 Đơn hàng của tôi</a>
        <a href="#">
            🔔 Thông báo
            <span class="badge bg-danger float-end">3</span>
        </a>
        <a href="#">💳 Hóa đơn</a>
    </div>

    <!-- CONTENT -->
    <div class="flex-grow-1 p-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h2 class="m-0">Sản phẩm đặt hàng sỉ</h2>

            <div>
                <span>Xin chào, <b>Đại lý Demo</b></span>
                <a href="/logout" class="btn btn-sm btn-outline-danger ms-3">Đăng xuất</a>
            </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="row g-4">

            <div class="col-lg-3 col-md-4 col-sm-6"
                 th:each="sp : ${products}">

                <div class="card product-card border-0 shadow-sm h-100 rounded-3">

                    <!-- ẢNH BASE64 / DEFAULT -->
                    <img class="product-img"
                         th:src="${(sp.img != null and sp.img != '')
                                    ? 'data:image/png;base64,' + sp.img
                                    : '/images/product-3.png'}"
                         alt="Khô gà">

                    <div class="card-body text-center d-flex flex-column">

                        <h5 class="card-title fw-bold"
                            th:text="${sp.name}">
                        </h5>

                        <h5 class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(sp.wholesalePrice,0,'COMMA',0,'POINT')}
                                     + ' đ / ' + ${sp.weightGrams} + 'g'">
                        </h5>

                        <p class="text-muted small mb-3">
                            Hạn dùng:
                            <span th:text="${sp.expiryDays}"></span> ngày
                        </p>

                        <button class="btn btn-warning fw-bold text-white mt-auto">
                            🛒 Thêm vào giỏ
                        </button>

                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
