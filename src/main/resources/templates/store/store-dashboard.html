<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mua khô gà sỉ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{background:#f8f9fa;}

        .topbar{
            background:linear-gradient(45deg,#ff9800,#ff5722);
            padding:12px 0;
        }

        .topbar h4{color:white;margin:0;}

        .product-card{
            border-radius:16px;
            transition:.25s;
        }

        .product-card:hover{
            transform:translateY(-6px);
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .product-img{
            height:220px;
            object-fit:cover;
            border-top-left-radius:16px;
            border-top-right-radius:16px;
        }

        .price{
            font-weight:bold;
            color:#e53935;
        }

        .btn-cart{
            background:linear-gradient(45deg,#ff9800,#ff5722);
            border:none;
            color:white;
        }

        #noResult{display:none;}

    </style>
</head>

<body>

<div class="topbar">
    <div class="container d-flex justify-content-between align-items-center">

        <h4>🛒 Đại Lý Khô Gà</h4>

        <div class="dropdown">

            <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">

                <img src="https://ui-avatars.com/api/?name=Store&background=f39c12&color=fff"
                     style="width:32px;height:32px;border-radius:50%;margin-right:5px">

                Tài khoản Đại lý

            </button>

            <ul class="dropdown-menu dropdown-menu-end">

                <li><a class="dropdown-item" href="/store/profile">👤 Thông tin cá nhân</a></li>
                <li><hr></li>
                <li><a class="dropdown-item text-danger" href="/logout">🚪 Đăng xuất</a></li>

            </ul>

        </div>
    </div>
</div>

<div class="container py-4">

    <div class="row mb-4 align-items-center">

        <div class="col-md-4">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Tìm sản phẩm...">
        </div>

        <div class="col-md-3">

            <select id="sortPrice" class="form-select">

                <option value="">Sắp xếp theo giá</option>
                <option value="asc">Giá tăng dần</option>
                <option value="desc">Giá giảm dần</option>

            </select>

        </div>

        <div class="col-md-3">

            <select id="filterWeight" class="form-select">

                <option value="">Lọc theo trọng lượng</option>
                <option value="100">100g</option>
                <option value="200">200g</option>
                <option value="500">500g</option>

            </select>

        </div>

        <div class="col-md-2 text-end">

            <a href="/store/cart" id="cartCountBtn" class="btn btn-outline-dark fw-bold">

                🛒 Giỏ hàng (<span th:text="${cartCount != null ? cartCount : 0}">0</span>)

            </a>

        </div>
    </div>

    <div class="row g-4" id="productContainer">

        <div class="col-lg-3 col-md-4 col-sm-6 product-item"
             th:each="sp : ${productPage.content}"
             th:data-price="${sp.wholesalePrice}"
             th:data-weight="${sp.weightGrams}">

            <div class="card product-card h-100 shadow-sm">

                <img class="product-img"
                     th:src="${(sp.img != null and sp.img != '')
? 'data:image/png;base64,' + sp.img
: '/images/product-3.png'}">

                <div class="card-body text-center d-flex flex-column">

                    <h5 class="fw-bold product-name"
                        th:text="${sp.name}"></h5>

                    <div class="price mb-2"
                         th:text="${#numbers.formatDecimal(sp.wholesalePrice,0,'COMMA',0,'POINT')}
+ ' đ / ' + ${sp.weightGrams} + 'g'">
                    </div>

                    <p class="text-muted small mb-3">

                        Hạn dùng:
                        <span th:text="${sp.expiryDays}"></span> ngày

                    </p>

                    <button class="btn btn-cart mt-auto fw-bold btn-add-cart"
                            th:data-id="${sp.id}"
                            th:data-name="${sp.name}"
                            th:data-price="${sp.wholesalePrice}">

                        🛒 Thêm vào giỏ

                    </button>

                </div>
            </div>
        </div>

    </div>

    <div id="noResult" class="text-center mt-5">
        <h5 class="text-danger">❌ Không tìm thấy sản phẩm</h5>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    $(document).ready(function(){

        function filterProducts(){

            let keyword=$("#searchInput").val().toLowerCase();
            let weight=$("#filterWeight").val();

            let found=false;

            $(".product-item").each(function(){

                let name=$(this).find(".product-name").text().toLowerCase();
                let w=$(this).data("weight").toString();

                let matchName=name.includes(keyword);
                let matchWeight=(weight==""||w==weight);

                if(matchName && matchWeight){

                    $(this).show();
                    found=true;

                }else{

                    $(this).hide();

                }

            });

            if(found) $("#noResult").hide();
            else $("#noResult").show();

        }

        $("#searchInput").on("keyup",filterProducts);

        $("#filterWeight").on("change",filterProducts);

        $("#sortPrice").on("change",function(){

            let order=$(this).val();

            let items=$(".product-item").get();

            items.sort(function(a,b){

                let priceA=$(a).data("price");
                let priceB=$(b).data("price");

                if(order==="asc") return priceA-priceB;
                if(order==="desc") return priceB-priceA;

            });

            $.each(items,function(i,item){

                $("#productContainer").append(item);

            });

        });

        $(document).on("click",".btn-add-cart",function(){

            let btn=$(this);

            let id=btn.data("id");
            let name=btn.data("name");
            let price=btn.data("price");

            $.post("/store/cart/add",{id:id,name:name,price:price},function(res){

                let text=btn.html();

                btn.removeClass("btn-cart").addClass("btn-success").text("✔ Đã thêm");

                $("#cartCountBtn").html("🛒 Giỏ hàng ("+res.totalCount+")");

                setTimeout(function(){

                    btn.removeClass("btn-success").addClass("btn-cart").html(text);

                },1500);

            });

        });

    });

</script>

</body>
</html>
