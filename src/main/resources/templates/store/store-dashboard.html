<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đại lý - Hệ thống Khô Gà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px; display: block; border-radius: 5px;}
        .sidebar a:hover { background-color: #f39c12; color: white; }
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar p-3" style="width: 250px;">
        <h4 class="text-warning text-center fw-bold mt-2 mb-4">Đại Lý Khô Gà</h4>
        <a href="#" class="mb-2">📦 Đặt hàng</a>
        <a href="#" class="mb-2">📝 Đơn hàng của tôi</a>
        <a href="#" class="mb-2">🔔 Thông báo <span class="badge bg-danger float-end">3</span></a>
        <a href="#" class="mb-2">💳 Hóa đơn</a>
    </div>

    <div class="flex-grow-1 p-4 bg-light">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h2 class="m-0">Sản phẩm Đặt hàng sỉ</h2>
            <div>
                <span>Xin chào, <b>Đại lý Demo</b></span>
                <a href="/logout" class="btn btn-sm btn-outline-danger ms-3">Đăng xuất</a>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-md-3" th:each="sp : ${products}">
                <div class="card product-card border-0 h-100">

                    <img th:src="@{'/images/product-' + ${sp.id} + '.png'}"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;"
                         alt="Khô gà"
                         onerror="this.src='https://via.placeholder.com/300x200/cccccc/ffffff?text=Chưa+có+ảnh'">

                    <div class="card-body text-center d-flex flex-column">
                        <h5 class="card-title" th:text="${sp.name}">Tên sản phẩm mặc định</h5>

                        <h5 class="text-danger fw-bold" th:text="${sp.wholesalePrice} + ' đ / ' + ${sp.weightGrams} + 'g'">Giá tiền</h5>

                        <p class="text-muted small mb-3">
                            Hạn dùng: <span th:text="${sp.expiryDays}"></span> ngày
                        </p>

                        <button class="btn btn-warning w-100 fw-bold text-white mt-auto">Thêm vào giỏ</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
