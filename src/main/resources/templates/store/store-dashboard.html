<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mua khô gà sỉ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }

        .topbar {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            padding: 12px 0;
        }

        .topbar h4 { color: white; margin: 0; }

        .product-card {
            border-radius: 16px;
            transition: all .25s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }

        .product-img {
            height: 220px;
            object-fit: cover;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .price {
            font-weight: bold;
            color: #e53935;
        }

        .btn-cart {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            border: none;
            color: white;
        }

        #noResult {
            display: none;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="topbar">
    <div class="container d-flex justify-content-between align-items-center">
        <h4>🛒 Đại Lý Khô Gà</h4>
        <div class="text-white">
            Xin chào, <b>Đại lý Demo</b>
            <button type="button" id="deliveryButton" class="btn btn-light btn-sm ms-2" title="Giao hàng">🛵</button>
            <a href="/logout" class="btn btn-light btn-sm ms-3">Đăng xuất</a>
        </div>
    </div>
</div>

<div class="container py-4">

    <!-- TOOLBAR -->
    <div class="row mb-4 align-items-center">

        <!-- SEARCH -->
        <div class="col-md-4">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="🔍 Tìm sản phẩm...">
        </div>

        <!-- FILTER UI (chỉ thiết kế) -->
        <div class="col-md-3">
            <select class="form-select">
                <option>Sắp xếp theo giá</option>
                <option>Giá tăng dần</option>
                <option>Giá giảm dần</option>
            </select>
        </div>

        <div class="col-md-3">
            <select class="form-select">
                <option>Lọc theo trọng lượng</option>
                <option>100g</option>
                <option>200g</option>
                <option>500g</option>
            </select>
        </div>

        <div class="col-md-2 text-end">
            <button class="btn btn-outline-dark">
                🛒 Giỏ hàng (0)
            </button>
        </div>

    </div>

    <!-- PRODUCT GRID -->
    <div class="row g-4" id="productContainer">

        <div class="col-lg-3 col-md-4 col-sm-6 product-item"
             th:each="sp : ${productPage.content}">

            <div class="card product-card h-100 shadow-sm">

                <img class="product-img"
                     th:src="${(sp.img != null and sp.img != '')
                                ? 'data:image/png;base64,' + sp.img
                                : '/images/product-3.png'}"
                     alt="Khô gà">

                <div class="card-body text-center d-flex flex-column">

                    <h5 class="fw-bold product-name"
                        th:text="${sp.name}">
                    </h5>

                    <div class="price mb-2"
                         th:text="${#numbers.formatDecimal(sp.wholesalePrice,0,'COMMA',0,'POINT')}
                                  + ' đ / ' + ${sp.weightGrams} + 'g'">
                    </div>

                    <p class="text-muted small mb-3">
                        Hạn dùng:
                        <span th:text="${sp.expiryDays}"></span> ngày
                    </p>

                    <button class="btn btn-cart mt-auto fw-bold">
                        🛒 Thêm vào giỏ
                    </button>

                </div>
            </div>
        </div>

    </div>

    <!-- NO RESULT -->
    <div id="noResult" class="text-center mt-5">
        <h5 class="text-danger">❌ Không tìm thấy sản phẩm</h5>
    </div>

    <!-- PAGINATION -->
    <nav class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item"
                th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/store/dashboard(page=${currentPage-1})}">←</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, productPage.totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/store/dashboard(page=${i})}"
                   th:text="${i+1}"></a>
            </li>

            <li class="page-item"
                th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/store/dashboard(page=${currentPage+1})}">→</a>
            </li>
        </ul>
    </nav>

</div>

<!-- JQUERY -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    $(document).ready(function () {

        $("#deliveryButton").on("click", function () {
            window.location.href = "/shipper-dashboard";
        });

        $("#searchInput").on("keyup", function () {

            let value = $(this).val().toLowerCase();
            let found = false;

            $(".product-item").filter(function () {

                let text = $(this).find(".product-name").text().toLowerCase();

                if (text.indexOf(value) > -1) {
                    $(this).show();
                    found = true;
                } else {
                    $(this).hide();
                }

            });

            if (!found) {
                $("#noResult").show();
            } else {
                $("#noResult").hide();
            }

        });

    });
</script>

</body>
</html>
