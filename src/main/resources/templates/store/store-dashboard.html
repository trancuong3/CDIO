<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mua khô gà sỉ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }

        .topbar {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            padding: 12px 0;
        }

        .topbar h4 { color: white; margin: 0; }

        .product-card {
            border-radius: 16px;
            transition: all .25s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }

        .product-img {
            height: 220px;
            object-fit: cover;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .price {
            font-weight: bold;
            color: #e53935;
        }

        .btn-cart {
            background: linear-gradient(45deg,#ff9800,#ff5722);
            border: none;
            color: white;
        }

        #noResult {
            display: none;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="container d-flex justify-content-between align-items-center">
        <h4>🛒 Đại Lý Khô Gà</h4>

        <div class="dropdown">
            <button class="btn btn-light shadow-sm dropdown-toggle d-flex align-items-center px-3 py-1" type="button" id="profileMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="https://ui-avatars.com/api/?name=Store&background=f39c12&color=fff" alt="Avatar" class="rounded-circle me-2" style="width: 32px; height: 32px;">
                <span class="fw-bold me-1 text-dark">Tài khoản Đại lý</span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end shadow mt-2" aria-labelledby="profileMenu">
                <li><a class="dropdown-item py-2" href="/store/profile">👤 Thông tin cá nhân</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item py-2 text-danger fw-bold" href="/logout">🚪 Đăng xuất</a></li>
            </ul>
        </div>
    </div>
</div>

<div class="container py-4">

    <div class="row mb-4 align-items-center">
        <div class="col-md-4">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Tìm sản phẩm...">
        </div>
        <div class="col-md-3">
            <select class="form-select">
                <option>Sắp xếp theo giá</option>
                <option>Giá tăng dần</option>
                <option>Giá giảm dần</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select">
                <option>Lọc theo trọng lượng</option>
                <option>100g</option>
                <option>200g</option>
                <option>500g</option>
            </select>
        </div>
        <div class="col-md-2 text-end">
            <a href="/store/cart" id="cartCountBtn" class="btn btn-outline-dark fw-bold">
                🛒 Giỏ hàng (<span th:text="${cartCount != null ? cartCount : 0}">0</span>)
            </a>
        </div>
    </div>

    <div class="row g-4" id="productContainer">
        <div class="col-lg-3 col-md-4 col-sm-6 product-item" th:each="sp : ${productPage.content}">
            <div class="card product-card h-100 shadow-sm">
                <img class="product-img"
                     th:src="${(sp.img != null and sp.img != '')
                                ? 'data:image/png;base64,' + sp.img
                                : '/images/product-3.png'}"
                     alt="Khô gà">
                <div class="card-body text-center d-flex flex-column">
                    <h5 class="fw-bold product-name" th:text="${sp.name}"></h5>
                    <div class="price mb-2"
                         th:text="${#numbers.formatDecimal(sp.wholesalePrice,0,'COMMA',0,'POINT')}
                                  + ' đ / ' + ${sp.weightGrams} + 'g'">
                    </div>
                    <p class="text-muted small mb-3">
                        Hạn dùng: <span th:text="${sp.expiryDays}"></span> ngày
                    </p>
                    <button class="btn btn-cart mt-auto fw-bold btn-add-cart"
                            th:data-id="${sp.id}"
                            th:data-name="${sp.name}"
                            th:data-price="${sp.wholesalePrice}">
                        🛒 Thêm vào giỏ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="noResult" class="text-center mt-5">
        <h5 class="text-danger">❌ Không tìm thấy sản phẩm</h5>
    </div>

    <nav class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/store/dashboard(page=${currentPage-1})}">←</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages-1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/store/dashboard(page=${i})}" th:text="${i+1}"></a>
            </li>
            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/store/dashboard(page=${currentPage+1})}">→</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        $("#searchInput").on("keyup", function () {
            let value = $(this).val().toLowerCase();
            let found = false;
            $(".product-item").filter(function () {
                let text = $(this).find(".product-name").text().toLowerCase();
                if (text.indexOf(value) > -1) {
                    $(this).show();
                    found = true;
                } else {
                    $(this).hide();
                }
            });
            if (!found) {
                $("#noResult").show();
            } else {
                $("#noResult").hide();
            }
        });

        $(".btn-add-cart").click(function () {
            let btn = $(this);
            // Lấy thông tin đã giấu trong thẻ
            let id = btn.data("id");
            let name = btn.data("name");
            let price = btn.data("price");

            // Bắn dữ liệu ngầm lên Java (StoreController)
            $.post("/store/cart/add", { id: id, name: name, price: price }, function (response) {
                // Đổi màu nút thành xanh lá để báo hiệu mua thành công
                let originalText = btn.html();
                btn.removeClass("btn-cart").addClass("btn-success").text("✔ Đã thêm");

                // Cập nhật con số trên giỏ hàng góc phải màn hình
                $("#cartCountBtn").html(`🛒 Giỏ hàng (${response.totalCount})`);

                // Sau 1.5 giây, trả lại nút màu cam như cũ
                setTimeout(() => {
                    btn.removeClass("btn-success").addClass("btn-cart").html(originalText);
                }, 1500);
            });
        });
    });
</script>

</body>
</html>
