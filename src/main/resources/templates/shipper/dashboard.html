<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipper - Don Hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="m-0">Shipper Dashboard</h4>
        <div class="text-muted" th:text="${shipperName != null ? shipperName : 'Shipper'}">Shipper</div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-3 p-md-4">
            <h5 class="mb-3">Tat ca don hang tu bang don_hangs</h5>

            <div class="table-responsive">
                <table class="table table-sm table-bordered align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Ma don</th>
                        <th>Ngay dat</th>
                        <th>So dien thoai</th>
                        <th>Trang thai</th>
                        <th class="text-end">Tong tien</th>
                        <th class="text-center">Hanh dong</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(legacyOrders)}">
                        <td colspan="6" class="text-center text-muted">Khong lay duoc du lieu don_hangs. Kiem tra lai ten cot trong DB.</td>
                    </tr>

                    <tr th:each="l : ${legacyOrders}">
                        <td th:text="${l.maDonHang}">0</td>
                        <td th:text="${l.ngayDat != null ? #temporals.format(l.ngayDat, 'dd/MM/yyyy HH:mm') : '--'}">--</td>
                        <td th:text="${l.sdt != null ? l.sdt : '--'}">--</td>
                        <td>
                            <span class="badge text-bg-secondary" th:text="${l.trangThai != null ? l.trangThai : '--'}">--</span>
                        </td>
                        <td class="text-end" th:text="${l.tongTien != null ? #numbers.formatDecimal(l.tongTien, 0, 'COMMA', 0, 'POINT') + ' đ' : '--'}">--</td>
                        <td class="text-center">
                                                        <form th:if="${l.trangThai == null or (l.trangThai != 'DELIVERING' and l.trangThai != 'DELIVERED' and l.trangThai != 'shipping' and l.trangThai != 'delivered')}"
                                  th:action="@{/shipper/legacy/{id}/accept(id=${l.maDonHang})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-primary">Nhan giao</button>
                            </form>

                                                        <form th:if="${l.trangThai == 'DELIVERING' or l.trangThai == 'shipping'}"
                                  th:action="@{/shipper/legacy/{id}/confirm(id=${l.maDonHang})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-success">Da giao xong</button>
                            </form>

                                                        <span th:if="${l.trangThai == 'DELIVERED' or l.trangThai == 'delivered'}" class="text-success small">Hoan tat</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mt-3">
        <div class="card-body p-3 p-md-4">
            <h5 class="mb-3">Cap nhat thong tin giao hang (bang deliveries)</h5>

            <form th:if="${selectedDelivery == null}"
                  th:action="@{/shipper/deliveries/legacy/update}"
                  method="post" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Delivery ID</label>
                    <input id="legacyDeliveryIdDisplay" class="form-control" value="--" readonly>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Ma don hang</label>
                    <select class="form-select" name="maDonHang" required>
                        <option th:if="${#lists.isEmpty(orderCodeOptions)}" value="" selected disabled>Chua co ma don hang hop le</option>
                        <option th:each="code : ${orderCodeOptions}"
                                th:value="${code}"
                                th:text="${code}"
                                th:attr="data-legacy-id=${legacyIdByCode[code]}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Trang thai</label>
                    <select class="form-select" name="trangThai" required>
                        <option th:each="st : ${deliveryStatusOptions}"
                                th:value="${st}"
                                th:text="${st}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Ngay giao</label>
                    <input type="date" class="form-control" name="ngayDat"
                           th:value="${#temporals.createNow().toLocalDate()}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">So dien thoai</label>
                    <input class="form-control" name="sdt">
                </div>

                <div class="col-12">
                    <label class="form-label">Ly do tu choi / ghi chu</label>
                    <textarea class="form-control" name="incident" rows="3"></textarea>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Luu thong tin deliveries</button>
                    <a class="btn btn-outline-secondary" th:href="@{/shipper/dashboard}">Lam moi</a>
                </div>
            </form>

            <form th:if="${selectedDelivery != null}"
                  th:action="@{/shipper/deliveries/{id}/update(id=${selectedDelivery.id})}"
                  method="post" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Delivery ID</label>
                    <input id="legacyDeliveryIdDisplay" class="form-control" th:value="${selectedLegacyId != null ? selectedLegacyId : '--'}" readonly>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Ma don hang</label>
                    <select class="form-select" name="maDonHang" required>
                        <option th:if="${#lists.isEmpty(orderCodeOptions)}" value="" selected disabled>Chua co ma don hang hop le</option>
                        <option th:if="${selectedDelivery.maDonHang != null and !#lists.contains(orderCodeOptions, selectedDelivery.maDonHang)}"
                                th:value="${selectedDelivery.maDonHang}"
                                th:text="${selectedDelivery.maDonHang}"
                            th:attr="data-legacy-id=${legacyIdByCode[selectedDelivery.maDonHang]}"
                                selected>
                        </option>
                        <option th:each="code : ${orderCodeOptions}"
                                th:value="${code}"
                                th:text="${code}"
                            th:attr="data-legacy-id=${legacyIdByCode[code]}"
                                th:selected="${selectedDelivery.maDonHang == code}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Trang thai</label>
                    <select class="form-select" name="trangThai" required>
                        <option th:each="st : ${deliveryStatusOptions}"
                                th:value="${st}"
                                th:text="${st}"
                                th:selected="${selectedDelivery.trangThai == st}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Ngay giao</label>
                    <input type="date" class="form-control" name="ngayDat"
                           th:value="${selectedDelivery.ngayDat != null ? selectedDelivery.ngayDat : #temporals.createNow().toLocalDate()}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">So dien thoai</label>
                    <input class="form-control" name="sdt" th:value="${selectedDelivery.sdt}">
                </div>

                <div class="col-12">
                    <label class="form-label">Ly do tu choi / ghi chu</label>
                    <textarea class="form-control" name="incident" rows="3" th:text="${selectedDelivery.incident}"></textarea>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Luu thong tin deliveries</button>
                    <a class="btn btn-outline-secondary" th:href="@{/shipper/dashboard}">Lam moi</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (function () {
        const orderSelect = document.querySelector('select[name="maDonHang"]');
        const displayInput = document.getElementById('legacyDeliveryIdDisplay');

        if (!orderSelect || !displayInput) {
            return;
        }

        const updateDisplay = () => {
            const selectedOption = orderSelect.options[orderSelect.selectedIndex];
            const legacyId = selectedOption ? selectedOption.getAttribute('data-legacy-id') : null;
            displayInput.value = legacyId && legacyId.trim() !== '' ? legacyId : '--';
        };

        orderSelect.addEventListener('change', updateDisplay);
        updateDisplay();
    })();
</script>

</body>
</html>
