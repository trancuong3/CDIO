<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }

        .sidebar{
            width:240px;
            min-height:100vh;
            background:#1e293b;
            color:white;
            position:fixed;
        }

        .sidebar h4{
            padding:20px;
            text-align:center;
            background:#0f172a;
            margin:0;
        }

        .sidebar a{
            display:block;
            padding:12px 20px;
            color:#cbd5e1;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#f59e0b;
            color:white;
        }

        .content{
            margin-left:240px;
            padding:30px;
        }

        .topbar{
            background:white;
            padding:15px 25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,.05);
            margin-bottom:25px;
        }

        .product-img{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #dee2e6;
        }

        table{
            background:white;
            border-radius:12px;
            overflow:hidden;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>🛠 ADMIN</h4>
    <a th:href="@{/admin/products}">📦 Quản lý sản phẩm</a>
    <a th:href="@{/admin/inventory}">📊 Quản lý tồn kho</a>
    <a th:href="@{/admin/users}">👤 Quản lý User</a>
    <a th:href="@{/logout}" class="text-danger">🚪 Logout</a>
</div>

<div class="content">

    <div class="topbar d-flex justify-content-between align-items-center">
        <h4 class="m-0">📦 Quản lý sản phẩm</h4>
        <a th:href="@{/admin/products/create}" class="btn btn-success">➕ Thêm</a>
    </div>

    <table class="table table-hover shadow-sm text-center align-middle">
        <thead class="table-dark">
        <tr>

            <th>Ảnh</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Tồn</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="i : ${inventories}">

            <td>
                <img th:src="${
                        i.img != null and !#strings.isEmpty(i.img)
                        ? (i.img.startsWith('data')
                            ? i.img
                            : 'data:image/png;base64,' + i.img)
                        : '/images/product-3.png'
                    }"
                     class="product-img"/>
            </td>

            <td th:text="${i.productName}"></td>

            <td th:text="${#numbers.formatDecimal(i.wholesalePrice,0,'COMMA',0,'POINT')} + ' ₫'"></td>

            <td th:text="${i.quantity}"></td>

            <td>
                <a th:href="@{/admin/products/edit/{id}(id=${i.productId})}"
                   class="btn btn-sm btn-warning">Sửa</a>

                <a th:href="@{/admin/products/delete/{id}(id=${i.productId})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Xóa?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
