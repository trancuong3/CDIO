<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }

    /* ===== SIDEBAR ===== */
    .sidebar{
      width:240px;
      min-height:100vh;
      background:#1e293b;
      color:white;
      position:fixed;
    }

    .sidebar h4{
      padding:20px;
      text-align:center;
      background:#0f172a;
      margin:0;
    }

    .sidebar a{
      display:block;
      padding:12px 20px;
      color:#cbd5e1;
      text-decoration:none;
      transition:0.2s;
    }

    .sidebar a:hover{
      background:#f59e0b;
      color:white;
    }

    /* ===== CONTENT ===== */
    .content{
      margin-left:240px;
      padding:30px;
    }

    /* ===== TOPBAR ===== */
    .topbar{
      background:white;
      padding:15px 25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
      margin-bottom:25px;
    }

    .search-box{
      width:280px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>🛠 ADMIN</h4>

  <a th:href="@{/admin/products}">📦 Quản lý sản phẩm</a>
  <a th:href="@{/admin/inventory}">📊 Quản lý tồn kho</a>
  <a th:href="@{/admin/orders}">🧾 Duyệt đơn hàng</a>
  <a th:href="@{/admin/users}">👤 Quản lý User</a>
  <a th:href="@{/logout}" class="text-danger">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TOPBAR -->
  <div class="topbar d-flex justify-content-between align-items-center">

    <h4 class="m-0">👤 Quản lý User</h4>

    <div class="d-flex gap-2">

      <!-- SEARCH -->
      <input
              type="text"
              id="searchUser"
              class="form-control search-box"
              placeholder="🔍 Tìm username hoặc tên..."
      >

      <!-- ADD -->
      <a th:href="@{/admin/users/create}" class="btn btn-success">
        ➕ Thêm
      </a>

    </div>

  </div>

  <!-- TABLE -->
  <table class="table table-bordered table-hover bg-white shadow-sm">

    <thead class="table-dark text-center">
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Full Name</th>
      <th>Role</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody id="userTable">

    <tr th:each="u:${users}">
      <td th:text="${u.id}"></td>
      <td th:text="${u.username}"></td>
      <td th:text="${u.fullName}"></td>
      <td th:text="${u.role.name}"></td>
      <td th:text="${u.status}"></td>

      <td class="text-center">
        <a th:href="@{/admin/users/edit/{id}(id=${u.id})}"
           class="btn btn-warning btn-sm">
          Edit
        </a>
      </td>
    </tr>

    </tbody>

  </table>

</div>

<!-- JQUERY -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

  $(document).ready(function(){

      $("#searchUser").on("keyup", function(){

          let value = $(this).val().toLowerCase();

          $("#userTable tr").filter(function(){

              $(this).toggle(
                  $(this).text().toLowerCase().indexOf(value) > -1
              );

          });

      });

  });

</script>

</body>
</html>
