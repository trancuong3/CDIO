<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }
        .card{
            border-radius:12px;
        }
        .form-title{
            font-weight:600;
        }
    </style>
</head>

<body>

<div class="container mt-5" style="max-width:600px">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="form-title text-center mb-4"
                th:text="${user != null} ? '✏️ CHỈNH SỬA USER' : '➕ TẠO USER'">
            </h3>

            <form th:action="${user != null} ? @{/admin/users/update} : @{/admin/users/create}"
                  method="post">

                <input type="hidden" name="id"
                       th:value="${user != null ? user.id : ''}"/>

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control"
                           name="username"
                           th:value="${user != null ? user.username : ''}"
                           th:readonly="${user != null}"
                           required>
                </div>

                <!-- Password -->
                <div class="mb-3" th:if="${user == null}">
                    <label class="form-label">Password</label>
                    <input type="password"
                           class="form-control"
                           name="password"
                           required>
                </div>

                <!-- Full Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input class="form-control"
                           name="fullName"
                           th:value="${user != null ? user.fullName : ''}"
                           required>
                </div>

                <!-- Role -->
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="roleId">
                        <option th:each="r : ${roles}"
                                th:value="${r.id}"
                                th:text="${r.name}"
                                th:selected="${user != null and user.role.id == r.id}">
                        </option>
                    </select>
                </div>

                <!-- Store -->
                <div class="mb-3">
                    <label class="form-label">Store</label>
                    <select class="form-select" name="storeId">
                        <option value="">--None--</option>
                        <option th:each="s : ${stores}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${user != null and user.store != null and user.store.id == s.id}">
                        </option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/admin/users}" class="btn btn-secondary">
                        ⬅ Back
                    </a>

                    <button type="submit" class="btn btn-primary">
                        💾 Save
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
