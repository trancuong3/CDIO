<form th:action="@{/admin/products/save}"
      th:object="${product}"
      method="post"
      enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}"/>

    Tên:
    <input th:field="*{name}" required/><br><br>

    Gram:
    <input type="number" th:field="*{weightGrams}" required/><br><br>

    Giá sỉ:
    <input type="number" step="0.01" th:field="*{wholesalePrice}" required/><br><br>

    Hạn dùng (ngày):
    <input type="number" th:field="*{expiryDays}" min="0" required/><br><br>

    Active:
    <input type="checkbox" th:field="*{isActive}"/><br><br>

    Ảnh:
    <input type="file" name="imageFile" accept="image/*"/><br><br>

    <!-- Preview nếu đã có ảnh -->
    <div th:if="${product.img != null}">
        <img th:src="'data:image/png;base64,' + ${product.img}"
             width="120"/>
    </div>
    <a th:href="@{/admin/products}">⬅ Quay lại</a>

    <button type="submit">Lưu</button>
</form>
