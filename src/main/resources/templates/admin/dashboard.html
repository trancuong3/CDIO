<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: #1e293b;
      color: white;
      position: fixed;
    }

    .sidebar h4 {
      padding: 20px;
      text-align: center;
      background: #0f172a;
      margin: 0;
    }

    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: #cbd5e1;
      text-decoration: none;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: #f59e0b;
      color: white;
    }

    /* ===== CONTENT ===== */
    .content {
      margin-left: 240px;
      padding: 30px;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      background: white;
      padding: 15px 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,.05);
      margin-bottom: 25px;
    }

    /* ===== DASHBOARD CARDS ===== */
    .dashboard-card {
      border-radius: 15px;
      padding: 25px;
      color: white;
      transition: 0.3s;
    }

    .dashboard-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,.15);
    }

    .bg-products { background: linear-gradient(45deg,#3b82f6,#1e40af); }
    .bg-inventory { background: linear-gradient(45deg,#10b981,#065f46); }
    .bg-users { background: linear-gradient(45deg,#ef4444,#7f1d1d); }

    .card-link {
      text-decoration: none;
      color: white;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>🛠 ADMIN</h4>

  <a th:href="@{/admin/products}">📦 Quản lý sản phẩm</a>
  <a th:href="@{/admin/inventory}">📊 Quản lý tồn kho</a>
  <a th:href="@{/admin/users}">👤 Quản lý User</a>
  <a th:href="@{/logout}" class="text-danger">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TOPBAR -->
  <div class="topbar d-flex justify-content-between align-items-center">
    <h4 class="m-0">Dashboard Quản Trị</h4>
    <span>Xin chào, <b>Admin</b></span>
  </div>

  <!-- DASHBOARD CARDS -->
  <div class="row g-4">

    <div class="col-md-6 col-lg-3">
      <a th:href="@{/admin/products}" class="card-link">
        <div class="dashboard-card bg-products text-center">
          <h3>📦</h3>
          <h5>Quản lý sản phẩm</h5>
          <p>Thêm, sửa, xóa sản phẩm</p>
        </div>
      </a>
    </div>

    <div class="col-md-6 col-lg-3">
      <a th:href="@{/admin/inventory}" class="card-link">
        <div class="dashboard-card bg-inventory text-center">
          <h3>📊</h3>
          <h5>Quản lý tồn kho</h5>
          <p>Kiểm soát số lượng hàng</p>
        </div>
      </a>
    </div>

    <div class="col-md-6 col-lg-3">
      <a th:href="@{/admin/users}" class="card-link">
        <div class="dashboard-card bg-users text-center">
          <h3>👤</h3>
          <h5>Quản lý User</h5>
          <p>Phân quyền & quản lý tài khoản</p>
        </div>
      </a>
    </div>

  </div>

</div>

</body>
</html>
