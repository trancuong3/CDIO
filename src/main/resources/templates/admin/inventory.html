<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tồn kho</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        /* SIDEBAR */

        .sidebar{
            width:240px;
            min-height:100vh;
            background:#1e293b;
            color:white;
            position:fixed;
        }

        .sidebar h4{
            padding:20px;
            text-align:center;
            background:#0f172a;
            margin:0;
        }

        .sidebar a{
            display:block;
            padding:12px 20px;
            color:#cbd5e1;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#f59e0b;
            color:white;
        }

        /* CONTENT */

        .content{
            margin-left:240px;
            padding:30px;
        }

        .topbar{
            background:white;
            padding:15px 25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,.05);
            margin-bottom:25px;
        }

        /* IMAGE */

        .product-img{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #dee2e6;
        }

        /* TABLE */

        table{
            background:white;
            border-radius:12px;
            overflow:hidden;
        }

        /* STATUS COLOR */

        .status-good{ background:#e6f9ed; }
        .status-warning{ background:#fff8e1; }
        .status-low{ background:#ffe8cc; }
        .status-expired{ background:#ffe5e5; }

        .badge-good{ background:#28a745; }
        .badge-warning{ background:#ffc107; color:black; }
        .badge-low{ background:#fd7e14; }
        .badge-expired{ background:#dc3545; }

        #noResult{
            display:none;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>🛠 ADMIN</h4>

    <a th:href="@{/admin/products}">📦 Quản lý sản phẩm</a>
    <a th:href="@{/admin/inventory}">📊 Quản lý tồn kho</a>
    <a th:href="@{/admin/users}">👤 Quản lý User</a>
    <a th:href="@{/logout}" class="text-danger">🚪 Logout</a>

</div>


<div class="content">

    <div class="topbar d-flex justify-content-between align-items-center">

        <h4 class="m-0">📊 Quản lý tồn kho</h4>

        <input
                type="text"
                id="searchInput"
                class="form-control w-25"
                placeholder="🔍 Tìm sản phẩm...">

    </div>


    <!-- FORM NHẬP / XUẤT -->

    <div class="card p-3 mb-4 shadow-sm">

        <div class="row">

            <!-- NHẬP KHO -->

            <div class="col-md-6">

                <form th:action="@{/admin/inventory/in}" method="post" class="d-flex gap-2">

                    <select name="productId" class="form-select" required>

                        <option value="">Chọn sản phẩm</option>

                        <option
                                th:each="p:${products}"
                                th:value="${p.id}"
                                th:text="${p.name}">
                        </option>

                    </select>

                    <input
                            type="number"
                            name="qty"
                            min="1"
                            class="form-control"
                            placeholder="Số lượng"
                            required>

                    <button class="btn btn-success">Nhập</button>

                </form>

            </div>


            <!-- XUẤT KHO -->

            <div class="col-md-6">

                <form th:action="@{/admin/inventory/out}" method="post" class="d-flex gap-2">

                    <select name="productId" class="form-select" required>

                        <option value="">Chọn sản phẩm</option>

                        <option
                                th:each="p:${products}"
                                th:value="${p.id}"
                                th:text="${p.name}">
                        </option>

                    </select>

                    <input
                            type="number"
                            name="qty"
                            min="1"
                            class="form-control"
                            placeholder="Số lượng"
                            required>

                    <button class="btn btn-danger">Xuất</button>

                </form>

            </div>

        </div>

    </div>


    <!-- BẢNG TỒN KHO -->

    <table class="table table-hover shadow-sm text-center align-middle">

        <thead class="table-dark">

        <tr>

            <th>Ảnh</th>
            <th>Tên</th>
            <th>Tồn</th>
            <th>Hết hạn</th>
            <th>Còn</th>

        </tr>

        </thead>

        <tbody id="inventoryTable">

        <tr
                class="inventory-row"
                th:each="i:${inventories}"
                th:classappend="${
i.daysLeft <= 0 ? 'status-expired' :
(i.daysLeft <=7 ? 'status-low' :
(i.daysLeft <=30 ? 'status-warning' :
'status-good'))
}">

            <td>

                <img
                        th:src="${
i.img != null and !#strings.isEmpty(i.img)
? (i.img.startsWith('data')
? i.img
: 'data:image/png;base64,' + i.img)
: '/images/product-3.png'
}"
                        class="product-img"/>

            </td>

            <td class="product-name"
                th:text="${i.productName}">
            </td>

            <td th:text="${i.quantity}"></td>

            <td th:text="${#temporals.format(i.expiredAt,'dd/MM/yyyy')}"></td>

            <td>

<span
        class="badge"
        th:classappend="${
i.daysLeft <= 0 ? 'badge-expired' :
(i.daysLeft <=7 ? 'badge-low' :
(i.daysLeft <=30 ? 'badge-warning' :
'badge-good'))
}"
        th:text="${i.daysLeft <= 0 ? 'Quá hạn' : i.daysLeft + ' ngày'}">
</span>

            </td>

        </tr>

        </tbody>

    </table>

    <div id="noResult" class="text-center mt-4">
        <h5 class="text-danger">❌ Không tìm thấy sản phẩm</h5>
    </div>

</div>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

    $(document).ready(function(){

        $("#searchInput").on("keyup",function(){

            let keyword=$(this).val().toLowerCase();
            let found=false;

            $(".inventory-row").each(function(){

                let name=$(this).find(".product-name").text().toLowerCase();

                if(name.includes(keyword)){

                    $(this).show();
                    found=true;

                }else{

                    $(this).hide();

                }

            });

            if(found){

                $("#noResult").hide();

            }else{

                $("#noResult").show();

            }

        });

    });

</script>

</body>
</html>
