<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tồn kho</title>

    <style>
        body {
            font-family: Arial;
            padding: 25px;
            background: #f4f6f9;
        }

        h2 {
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #222;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .danger {
            background: #ffcccc !important;
        }

        .warn {
            background: #fff3cd !important;
        }

        form {
            margin-bottom: 15px;
        }

        input, select, button {
            padding: 6px;
        }

        img {
            border-radius: 5px;
        }

    </style>
</head>

<body>

<h2>📦 QUẢN LÝ TỒN KHO</h2>

<!-- ===== NHẬP KHO ===== -->
<form th:action="@{/admin/inventory/in}" method="post">

    <select name="productId" required>
        <option value="">-- Chọn sản phẩm --</option>
        <option th:each="p : ${products}"
                th:value="${p.id}"
                th:text="${p.name}">
        </option>
    </select>

    <input type="number" name="qty" placeholder="Số lượng" min="1" required>

    <button type="submit">➕ Nhập kho</button>
</form>

<!-- ===== XUẤT KHO ===== -->
<form th:action="@{/admin/inventory/out}" method="post">

    <select name="productId" required>
        <option value="">-- Chọn sản phẩm --</option>
        <option th:each="p : ${products}"
                th:value="${p.id}"
                th:text="${p.name}">
        </option>
    </select>

    <input type="number" name="qty" placeholder="Số lượng" min="1" required>

    <button type="submit">➖ Xuất kho</button>
</form>

<br>

<table>

    <thead>
    <tr>
        <th>Ảnh</th>
        <th>Tên sản phẩm</th>
        <th>Gram</th>
        <th>Giá</th>
        <th>Tồn kho</th>
        <th>Ngày nhập</th>
        <th>Ngày hết hạn</th>
        <th>Còn (ngày)</th>
    </tr>
    </thead>

    <tbody>

    <!-- QUAN TRỌNG: Sửa toán tử 3 ngôi cho đúng -->
    <tr th:each="i : ${inventories}"
        th:classappend="${i.daysLeft < 0 ? 'danger' : (i.daysLeft < 3 ? 'warn' : '')}">

        <!-- Ảnh -->
        <td>
            <img th:if="${i.img != null}"
                 th:src="${'data:image/png;base64,' + i.img}"
                 width="60"/>

            <img th:if="${i.img == null}"
                 th:src="@{/images/product-1.png}"
                 width="60"/>
        </td>

        <td th:text="${i.productName}"></td>

        <td th:text="${i.weightGrams}"></td>

        <td th:text="${#numbers.formatDecimal(i.wholesalePrice,0,'COMMA',0,'POINT')}"></td>

        <td th:text="${i.quantity}"></td>

        <td th:text="${i.createdAt != null ? #temporals.format(i.createdAt,'dd/MM/yyyy') : ''}"></td>

        <td th:text="${i.expiredAt != null ? #temporals.format(i.expiredAt,'dd/MM/yyyy') : ''}"></td>

        <td th:text="${i.daysLeft != null ? i.daysLeft : ''}"></td>

    </tr>

    </tbody>

</table>

</body>
</html>
