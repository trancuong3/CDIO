<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Thanh toán VietQR</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background: linear-gradient(135deg,#f6f9fc,#e9f2ff);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .payment-card{
      background:white;
      border-radius:20px;
      padding:40px;
      width:420px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .qr-box{
      padding:15px;
      border-radius:15px;
      background:#f8f9fa;
      display:inline-block;
      margin:20px 0;
    }

    .qr-box img{
      width:260px;
    }

    .order-code{
      background:#eef3ff;
      padding:10px 15px;
      border-radius:10px;
      font-weight:bold;
      color:#0d6efd;
      display:inline-block;
    }

    .waiting{
      margin-top:15px;
      color:#6c757d;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="payment-card">

  <h3 class="mb-3">Thanh toán VietQR</h3>

  <p>
    Mã đơn hàng:
    <b th:text="${order.id}"></b>
  </p>

  <p>
    Số tiền:
    <b class="text-danger fs-5"
       th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' VND'">
    </b>
  </p>

  <div class="qr-box">
    <img th:src="${qrUrl}" alt="QR thanh toán">
  </div>

  <p>Nội dung chuyển khoản</p>

  <div class="order-code">
    ORDER<span th:text="${order.id}"></span>
  </div>

  <p class="waiting">
    ⏳ Hệ thống sẽ tự chuyển trang khi admin duyệt đơn
  </p>

</div>

<script th:inline="javascript">
  /*<![CDATA[*/

  const orderId = /*[[${order.id}]]*/ 0;

  setInterval(function () {

    fetch("/api/order-status/" + orderId)
            .then(function (response) {
              return response.text();
            })
            .then(function (status) {

              console.log("Order status:", status);

              if (status === "APPROVED" || status === "PAID") {
                window.location.href = "/order-approved";
              }

            })
            .catch(function (error) {
              console.error("Error:", error);
            });

  }, 3000);

  /*]]>*/
</script>

</body>
</html>
